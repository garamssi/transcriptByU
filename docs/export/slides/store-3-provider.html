<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;} html,body{margin:0;background:#08070f;font-family:"Pretendard",system-ui,sans-serif;-webkit-font-smoothing:antialiased;width:1280px;height:800px;overflow:hidden;} @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}</style>
</head><body><svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <linearGradient id="ssgrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#B26BFF"></stop><stop offset=".55" stop-color="#8B3DF5"></stop><stop offset="1" stop-color="#5B21B6"></stop></linearGradient>
  <symbol id="ssmark" viewBox="0 0 100 100">
    <rect x="4" y="4" width="92" height="92" rx="26" fill="url(#ssgrad)"></rect>
    <path d="M31 26 L31 52 A19 19 0 0 0 69 52 L69 26" fill="none" stroke="#fff" stroke-width="12" stroke-linecap="round"></path>
    <rect x="30" y="74" width="40" height="9" rx="4.5" fill="#fff" opacity=".95"></rect>
    <rect x="30" y="74" width="15" height="9" rx="4.5" fill="#3DF5C8"></rect>
  </symbol>
</defs></svg>
<div style="width:1280px; height:800px; border-radius:20px; overflow:hidden; position:relative; background:radial-gradient(900px 700px at 85% 100%, #201540 0%, #0b0816 60%);">
    <div style="position:absolute; inset:0; display:flex; align-items:center; padding:0 92px; gap:80px;">
      <div style="flex:1;">
        <div style="font-family:'JetBrains Mono',monospace; font-size:15px; letter-spacing:.16em; text-transform:uppercase; color:#B26BFF; margin-bottom:20px;">Your AI, your way</div>
        <h2 style="margin:0 0 24px; font-size:52px; line-height:1.12; font-weight:800; letter-spacing:-.02em; color:#fff;">원하는 AI로,<br>내 방식대로</h2>
        <p style="margin:0 0 36px; font-size:20px; line-height:1.6; color:rgba(244,242,250,.55); max-width:440px;">Gemini, Claude, 로컬 Claude Code 중 선택. 모델·언어·자막 스타일까지 세밀하게 조정하세요.</p>
        <div style="display:flex; flex-direction:column; gap:14px; max-width:400px;">
          <div style="display:flex; align-items:center; gap:14px;"><div style="width:38px;height:38px;border-radius:11px;background:rgba(139,61,245,.16);display:flex;align-items:center;justify-content:center;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#B26BFF" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg></div><span style="font-size:17px; color:rgba(244,242,250,.8);">3가지 AI 제공자 · 자유 전환</span></div>
          <div style="display:flex; align-items:center; gap:14px;"><div style="width:38px;height:38px;border-radius:11px;background:rgba(139,61,245,.16);display:flex;align-items:center;justify-content:center;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#B26BFF" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg></div><span style="font-size:17px; color:rgba(244,242,250,.8);">글자 크기·색상·배경 커스터마이즈</span></div>
          <div style="display:flex; align-items:center; gap:14px;"><div style="width:38px;height:38px;border-radius:11px;background:rgba(139,61,245,.16);display:flex;align-items:center;justify-content:center;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#B26BFF" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg></div><span style="font-size:17px; color:rgba(244,242,250,.8);">원본·번역 동시 표시 모드</span></div>
        </div>
      </div>
      <div style="width:380px; flex-shrink:0;">
        <div style="border-radius:22px; background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.09); padding:24px; box-shadow:0 50px 100px -30px rgba(0,0,0,.7);">
          <div style="font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:rgba(244,242,250,.4); font-family:'JetBrains Mono',monospace; margin-bottom:14px;">AI 제공자</div>
          <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:9px; margin-bottom:24px;">
            <div style="padding:16px 6px; border-radius:14px; border:1px solid rgba(255,255,255,.08); text-align:center; font-size:13px; font-weight:700; color:rgba(244,242,250,.8);">Claude<br>Code</div>
            <div style="padding:16px 6px; border-radius:14px; border:1px solid rgba(178,107,255,.7); background:linear-gradient(180deg,rgba(139,61,245,.24),rgba(139,61,245,.06)); text-align:center; font-size:14px; font-weight:800; color:#fff; box-shadow:0 0 24px rgba(139,61,245,.4);">Gemini</div>
            <div style="padding:16px 6px; border-radius:14px; border:1px solid rgba(255,255,255,.08); text-align:center; font-size:13px; font-weight:700; color:rgba(244,242,250,.8);">Claude</div>
          </div>
          <div style="display:flex; flex-direction:column; gap:12px;">
            <div style="display:flex; align-items:center; height:48px; padding:0 15px; border-radius:12px; background:#0a0812; border:1px solid rgba(255,255,255,.1); font-size:14px; color:#fff;">모델 · Flash 3.5<svg style="margin-left:auto" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(244,242,250,.4)" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg></div>
            <div style="display:flex; align-items:center; height:48px; padding:0 15px; border-radius:12px; background:#0a0812; border:1px solid rgba(255,255,255,.1); font-size:14px; color:#fff;">번역 언어 · 한국어<svg style="margin-left:auto" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(244,242,250,.4)" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg></div>
            <div style="padding:16px; border-radius:12px; background:#0a0812; border:1px solid rgba(255,255,255,.1);">
              <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;"><span style="font-size:13px; color:rgba(244,242,250,.6);">글자 크기</span><span style="font-family:'JetBrains Mono',monospace; font-size:12px; color:#B26BFF; background:rgba(139,61,245,.15); padding:3px 8px; border-radius:7px;">22px</span></div>
              <div style="height:6px; border-radius:3px; background:rgba(255,255,255,.1); position:relative;"><div style="position:absolute;left:0;top:0;bottom:0;width:72%;border-radius:3px;background:linear-gradient(90deg,#8B3DF5,#B26BFF);"></div><div style="position:absolute;left:72%;top:50%;transform:translate(-50%,-50%);width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.5);"></div></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body></html>
